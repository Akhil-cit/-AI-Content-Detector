<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Detector</title>
    <style>
        body {
    background-color: #0a0a0a;
    color: #00ff00;
    font-family: monospace;
    text-align: center;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
}

input {
    background: #111;
    color: #00ff00;
    border: 1px solid #00ff00;
    padding: 10px;
    margin: 10px;
    width: 80%;
    max-width: 400px;
}

button {
    background: #00ff00;
    color: #0a0a0a;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    width: 80%;
    max-width: 200px;
}

h1 {
    font-size: clamp(20px, 5vw, 40px);
}

#result {
    margin-top: 30px;
    font-size: clamp(16px, 4vw, 30px);
    font-weight: bold;
}
        
    </style>
</head>
<body>
    <h1>🕵️ AI Content Detector</h1>
    <p>Upload an image or video to check if it's AI generated</p>

    <input type="file" id="media" accept="image/*,video/*" />
    <br>
    <button onclick="analyze()">Analyze</button>

    <h2 id="result"></h2>

    <script>
        async function analyze() {
            let file = document.getElementById("media").files[0];
            if (!file) {
                alert("Please select a file first!");
                return;
            }

            document.getElementById("result").innerText = "Analyzing...";

            let form = new FormData();
            form.append("image", file);

            let res = await fetch("https://ai-content-detector-1uiw.onrender.com/analyze", {
    method: "POST",
    body: form
});

            let data = await res.json();
            document.getElementById("result").innerText = data.result;
        }
    </script>
</body>
</html>
